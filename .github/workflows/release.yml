name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run publish in dry-run mode (no upload to npm).'
        type: boolean
        required: false
        default: true
      ref:
        description: 'Git ref (tag/branch/SHA) to build from when triggered manually.'
        type: string
        required: false
        default: ''

# Serialize releases on the same ref but NEVER cancel a halfway-done publish
# (cancel-in-progress: false). A second tag push or workflow_dispatch will
# queue until the active run finishes rather than racing it.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Version probe
        run: npm run version-probe

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          # On tag push, derive version from the tag (strip leading 'v').
          # On workflow_dispatch without a tag ref, fall back to
          # package.json's current version — useful for dry-run rehearsals
          # off main without cutting a real tag.
          ref="${{ github.ref }}"
          if [[ "$ref" == refs/tags/v* ]]; then
            tag="${ref#refs/tags/}"
            version="${tag#v}"
          else
            version="$(node -e "console.log(require('./package.json').version)")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Sync package.json version
        run: |
          # Release-time mutation only — never committed back to main.
          node -e "
            const fs = require('node:fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "${{ steps.version.outputs.version }}"
          echo "package.json version synced to ${{ steps.version.outputs.version }}"
          node -e "console.log(require('./package.json').version)"

      - name: npm publish (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  smoke:
    name: post-publish smoke
    # Skip on dry-run dispatches — there's nothing to install from the registry.
    # Tag pushes always run; workflow_dispatch only runs when dry_run was unticked.
    if: ${{ github.event_name == 'push' || inputs.dry_run != true }}
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: install just-published tarball
        # Tag pushes set GITHUB_REF_NAME to the tag (e.g. v0.1.7); strip the leading v.
        # workflow_dispatch on a branch falls back to the registry's latest dist-tag —
        # the publish-npm job just put something there.
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(curl -s https://registry.npmjs.org/@danmestas/orch-executor-cf-worker/latest | node -e "let d='';process.stdin.on('data',c=>d+=c).on('end',()=>console.log(JSON.parse(d).version))")
          fi
          echo "installing @danmestas/orch-executor-cf-worker@$VERSION"
          # Retry up to 5 times in case of registry propagation lag — npm's
          # CDN can lag the publish API by tens of seconds.
          for i in 1 2 3 4 5; do
            if npm install -g "@danmestas/orch-executor-cf-worker@$VERSION"; then break; fi
            echo "install attempt $i failed; sleeping 10s and retrying..."
            sleep 10
          done
          npm list -g --depth=0 | grep '@danmestas/orch-executor-cf-worker' || (echo "package not installed" && exit 1)

      - name: bin shim probe
        # Proves the declared bin entry actually resolves on PATH and is
        # executable. Catches the bin-path / shebang / dist-missing regression
        # class that motivated this job.
        run: |
          set -euo pipefail
          which orch-executor-cf-worker

      - name: smoke — --version
        # Proves the CLI loads and the compiled dist/ shipped in the tarball.
        run: orch-executor-cf-worker --version

      - name: smoke — --help
        # Proves help text path is reachable too (exits 0, prints usage).
        run: orch-executor-cf-worker --help
