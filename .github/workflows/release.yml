name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run publish in dry-run mode (no upload to npm).'
        type: boolean
        required: false
        default: true
      ref:
        description: 'Git ref (tag/branch/SHA) to build from when triggered manually.'
        type: string
        required: false
        default: ''

# Serialize releases on the same ref but NEVER cancel a halfway-done publish
# (cancel-in-progress: false). A second tag push or workflow_dispatch will
# queue until the active run finishes rather than racing it.
concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Version probe
        run: npm run version-probe

  publish-npm:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve version
        id: version
        run: |
          # On tag push, derive version from the tag (strip leading 'v').
          # On workflow_dispatch without a tag ref, fall back to
          # package.json's current version — useful for dry-run rehearsals
          # off main without cutting a real tag.
          ref="${{ github.ref }}"
          if [[ "$ref" == refs/tags/v* ]]; then
            tag="${ref#refs/tags/}"
            version="${tag#v}"
          else
            version="$(node -e "console.log(require('./package.json').version)")"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $version"

      - name: Sync package.json version
        run: |
          # Release-time mutation only — never committed back to main.
          node -e "
            const fs = require('node:fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "${{ steps.version.outputs.version }}"
          echo "package.json version synced to ${{ steps.version.outputs.version }}"
          node -e "console.log(require('./package.json').version)"

      - name: npm publish (dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: npm publish --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm publish
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run) }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
