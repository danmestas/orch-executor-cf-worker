name: ci

on:
  push:
    branches: [main]
  pull_request:
  # Pre-wired for GitHub merge queue. Until a queue ruleset is enabled this
  # trigger is a no-op; once it's on, required-check jobs must respond to
  # refs/merge-queue/* or every PR will hang.
  merge_group:

# Kill superseded runs on the same ref so push-and-fix iterations don't pile
# up. github.workflow is included so unrelated workflows don't cross-cancel.
# (Release workflow has its own concurrency policy — never cancel deploys.)
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Version probe
        run: npm run version-probe

  npm-publish-dry-run:
    name: npm publish --dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install
        run: npm ci
      - name: Build
        run: npm run build
      - name: Publish dry-run
        run: npm publish --access public --dry-run
